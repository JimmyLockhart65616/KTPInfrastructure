# KTP Fleet — Expected systemd timers (source of truth)
#
# Used by scripts/audit-fleet-drift.py. Each line is a systemd timer unit
# name that should be present on the host group. Absence = drift (host is
# missing a KTP-maintained timer). Extra timers are ignored.
#
# Snapshot section: `KTP SYSTEMD TIMERS` (from fleet-drift-snapshot.sh,
# `systemctl list-timers 'ktp-*' --all` matched on `.timer` suffix).
#
# Data server (74.91.112.242) is NOT in the audit host list — its timers
# (hltv-restart.timer, hltv-api.service, etc.) are tracked separately.

# -----------------------------------------------------------------------------
# All game servers (baremetal + VPS)
# -----------------------------------------------------------------------------
# ktp-chrt.timer runs every 5 min to (re-)apply SCHED_FIFO pinning + CPU
# affinity to the 5 hlds_linux instances. Without it, restarted servers
# fall back to SCHED_OTHER and housekeeping CPUs.

[default]
ktp-chrt.timer
