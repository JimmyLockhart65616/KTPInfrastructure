# KTP Fleet — Expected GRUB cmdline flags (source of truth)
#
# Used by scripts/audit-fleet-drift.py to detect drift between the live
# /proc/cmdline and what the repo says each host SHOULD have. Format is
# one flag per line (either `key=value` or bare `flag`), scoped by host
# group with [section] headers.
#
# The audit only fails when an expected flag is MISSING on a host. Extra
# flags (BOOT_IMAGE, root=UUID, per-host legacy flags like consoleblank=0)
# are ignored — we're not building an exhaustive whitelist, just enforcing
# that the KTP-relevant tuning flags are present.
#
# Update after reboot-requiring GRUB changes. If all baremetals diverge
# from this together, audit catches silent repo-vs-fleet drift.

# -----------------------------------------------------------------------------
# Baremetal tuning (CPU isolation + c-state + mitigations)
# -----------------------------------------------------------------------------
# Rebooted 2026-03-11 to apply. Isolates CPUs 2-7 for hlds_linux game servers,
# housekeeping on 0-1. nohz_full + rcu_nocbs reduce scheduler/RCU wakeups on
# isolated cores. intel_idle.max_cstate=0 + processor.max_cstate=0 prevent
# deep c-state transitions (kept CPUs in C0/C1 for sub-microsecond wakeups).
# mitigations=off disables spectre/meltdown workarounds (we trust the boxes).

[baremetal]
intel_idle.max_cstate=0
isolcpus=2,3,4,5,6,7
mitigations=off
nohz_full=2,3,4,5,6,7
processor.max_cstate=0
rcu_nocbs=2,3,4,5,6,7

# -----------------------------------------------------------------------------
# Chicago VPS (4 vCPU shared — no CPU isolation possible)
# -----------------------------------------------------------------------------
# Chicago runs 4 game servers on 4 vCPUs with SCHED_FIFO + rtprio pinning
# only. C-state + mitigations flags still carry useful tuning.

[vps]
intel_idle.max_cstate=0
mitigations=off
processor.max_cstate=0
