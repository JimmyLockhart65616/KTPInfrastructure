// KTP Tier 1 smoke-test server config.
//
// Goals:
//  - Boot fast (no Steam auth, no master server)
//  - Stay on the same map (don't hot-cycle while the smoke run is mid-flight)
//  - Predictable rcon password
//  - Quiet console (no spam that could hide a real warning)
//
// Copy or symlink into <serverfiles>/dod/ before booting, and pass via
// `+servercfgfile test_server.cfg` on the hlds_linux command line.

hostname "KTP Smoke Test"
sv_lan 1
sv_region 255

// rcon — overridden by the +rcon_password CLI arg the harness passes;
// kept here as belt-and-suspenders so a manual boot still has a known pw.
rcon_password "smoketest"
sv_password ""

// Don't churn maps under the harness.
mp_timelimit 999
mp_fraglimit 0

// Standard KTP gameplay flags (mirrors local profile minus things the smoke
// harness doesn't care about).
mp_autocrosshair 0
mp_friendlyfire 0
mp_limitteams 0
mp_allowspectators 1
sv_cheats 0
pausable 0

// Logging — keep the engine writing logs so smoke runs can grep them post-hoc
// if the rcon assertion failed but we want richer context.
log on
sv_logecho 1
sv_logfile 1
sv_log_onefile 0

// Network — match production rates so a smoke boot exercises the same code
// paths a real server would.
sv_unlag 1
sv_minupdaterate 100
sv_maxupdaterate 120
sv_mincmdrate 100
sv_maxcmdrate 500
sv_minrate 100000
sv_maxrate 100000

sys_ticrate 1000
sv_stats 0

mapchangecfgfile "test_server.cfg"
