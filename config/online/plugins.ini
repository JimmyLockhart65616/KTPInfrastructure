; KTPAMXX Plugin Configuration
; Profile: ONLINE (production)
;
; Matches deployed state on Denver 5 / ATL1:27015 / NY1:27015 (verified
; 2026-04-22). Plugin load order matters — the AMXX admin base must load
; before any plugin that uses admin flags, and stats_logging (which hooks
; DODX death forwards) must load before KTP plugins that also consume
; client_death so dispatch order is deterministic.
;
; Plugins are loaded in order listed (top → bottom). Comment to disable.
; The `debug` flag enables AMXX's debug mode per plugin — retained on
; production KTP plugins for richer error reporting on live servers.

; AMXX base (required — provides admin flag infrastructure)
admin.amxx

; DoD stats (AMXX stock plugin — hooks client_death via DODX)
stats_logging.amxx debug

; KTP admin + security
KTPAdminAudit.amxx debug
ktp_cvar.amxx debug
ktp_file.amxx debug

; Core match handling
KTPMatchHandler.amxx debug

; HLTV integration
KTPHLTVRecorder.amxx debug

; Practice mode (loaded on all servers; inert unless enabled per-match)
KTPPracticeMode.amxx debug

; Gameplay modifications
KTPGrenadeLoadout.amxx debug
KTPGrenadeDamage.amxx debug
