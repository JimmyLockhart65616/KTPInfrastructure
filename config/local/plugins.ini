; KTPAMXX Plugin Configuration
; Profile: Local Development
;
; Mirrors config/online/plugins.ini so local reproduces production plugin
; load order and set. The only local-profile addition is KTPHudObserver.amxx
; at the end — dropped into local/plugins/ by dev workflow and copied into
; place at container start by runtime/entrypoint.sh.
;
; External service plugins (Discord URLs in KTPMatchHandler, HLTV API URL
; in KTPHLTVRecorder) become no-ops without configured URLs, so they're
; safe to load locally.
;
; Keep in sync with config/online/plugins.ini when production load changes.
;
; Plugins are loaded in order listed (top → bottom).

; AMXX base (required — provides admin flag infrastructure)
admin.amxx

; DoD stats (AMXX stock plugin — hooks client_death via DODX)
stats_logging.amxx debug

; KTP admin + security
KTPAdminAudit.amxx debug
ktp_cvar.amxx debug
ktp_file.amxx debug

; Core match handling
KTPMatchHandler.amxx debug

; HLTV integration (no-op without API URL)
KTPHLTVRecorder.amxx debug

; Practice mode (inert unless enabled per-match)
KTPPracticeMode.amxx debug

; Gameplay modifications
KTPGrenadeLoadout.amxx debug
KTPGrenadeDamage.amxx debug

; HUD Observer broadcast overlay (deployed via local/plugins/)
KTPHudObserver.amxx debug
