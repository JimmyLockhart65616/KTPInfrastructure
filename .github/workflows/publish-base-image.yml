# KTP Tier 1 — Publish runtime test-base image to GHCR
#
# Builds the same full-stack runtime image that smoke-callable.yml builds
# from scratch on every run, but does it once per night and pushes to GHCR
# so smoke runs can pull it instead of rebuilding.
#
# Per-smoke-run effect: ~12-20 min build → ~30 sec pull. ~75% reduction.
#
# Triggers:
#   - Nightly at 04:30 UTC (~12:30 AM ET, well clear of the 3 AM ET fleet
#     restart and any matchday traffic)
#   - workflow_dispatch — for ad-hoc rebuilds when a base component lands
#     a critical change that smoke needs to pick up immediately
#
# Output:
#   ghcr.io/<owner>/ktp-runtime-test-base:latest
#   ghcr.io/<owner>/ktp-runtime-test-base:<short-sha>
#
# Cost: GHCR storage. Each image is ~2 GB (HLDS DoD install + KTP overlays).
# Default GitHub retention will accumulate over time — recommend manual
# cleanup of old SHA tags every few months, or add a cleanup job (see
# action-cleanup-package or actions/delete-package-versions).

name: Publish runtime test-base image

on:
  schedule:
    - cron: '30 4 * * *'   # 04:30 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build + push ktp-runtime-test-base
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      VERSION: base
      IMAGE: ghcr.io/${{ github.repository_owner }}/ktp-runtime-test-base

    steps:
      # --- Same 14-repo sibling checkout as smoke-callable.yml. The base
      # image needs every component built so it's a complete drop-in for
      # smoke runs.
      - name: Checkout KTPInfrastructure
        uses: actions/checkout@v6
        with:
          path: KTPInfrastructure

      - name: Checkout KTPReHLDS
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTP-ReHLDS
          path: KTPReHLDS
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPAMXX (with submodules — public/amtl)
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPAMXX
          path: KTPAMXX
          submodules: recursive
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      # Metamod headers are vendored in KTPAMXX/third_party/metamod/ since
      # 2026-04-29 (KTPAMXX 2.7.14); no longer needs an external checkout.

      - name: Checkout KTPReAPI
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTP-ReAPI
          path: KTPReAPI
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPhlsdk
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPHLSDK
          path: KTPhlsdk
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPAmxxCurl
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPAMXXCurl
          path: KTPAmxxCurl
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPMatchHandler
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPMatchHandler
          path: KTPMatchHandler
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPHLTVRecorder
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPHLTVRecorder
          path: KTPHLTVRecorder
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPCvarChecker
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPCvarChecker
          path: KTPCvarChecker
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPFileChecker
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPFileChecker
          path: KTPFileChecker
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPAdminAudit
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPAdminAudit
          path: KTPAdminAudit
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPGrenades
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPGrenades
          path: KTPGrenades
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPPracticeMode
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPPracticeMode
          path: KTPPracticeMode
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      - name: Checkout KTPScoreTracker
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/KTPScoreTracker
          path: KTPScoreTracker
          token: ${{ secrets.KTP_CHECKOUT_TOKEN || github.token }}

      # KTPHudObserver lives in an external repo (JimmyLockhart65616/DoD-hud-
      # observer). First-class member of the smoke runtime — built into the
      # base image alongside KTP plugins, listed in config/local/plugins.ini.
      # Public alliedmodders-style repo, no token needed.
      - name: Checkout KTPHudObserver (JimmyLockhart65616/DoD-hud-observer)
        uses: actions/checkout@v6
        with:
          repository: JimmyLockhart65616/DoD-hud-observer
          path: KTPHudObserver

      # --- Full build (engine + amxx + reapi + curl + plugins).
      - name: Build all KTP components
        working-directory: KTPInfrastructure
        run: |
          export KTP_PROJECT_ROOT="$(cd .. && pwd)"
          make build VERSION="$VERSION"

      # --- Build the runtime image with our just-built artifacts.
      - name: Build runtime image
        working-directory: KTPInfrastructure
        run: |
          export KTP_PROJECT_ROOT="$(cd .. && pwd)"
          docker compose -f docker-compose.local.yml build ktp-game-1

      # --- Push to GHCR. Two tags: `latest` (smoke pulls this) + the short
      # commit SHA of KTPInfrastructure (so a regression can be pinned).
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image
        id: tag
        run: |
          SHORT_SHA="$(cd KTPInfrastructure && git rev-parse --short HEAD)"
          # The compose build produces ktp-gameserver:base by default.
          docker tag ktp-gameserver:base "$IMAGE:latest"
          docker tag ktp-gameserver:base "$IMAGE:$SHORT_SHA"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Tagged: $IMAGE:latest and $IMAGE:$SHORT_SHA"

      - name: Push image
        run: |
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ steps.tag.outputs.short_sha }}"
          echo ""
          echo "Pushed:"
          echo "  $IMAGE:latest"
          echo "  $IMAGE:${{ steps.tag.outputs.short_sha }}"

      # GHCR's edge caches occasionally serve a stale `:latest` manifest for a
      # handful of seconds after push. Both `:latest` and `:<short_sha>` were
      # tagged from the same local image and pushed back-to-back, so they MUST
      # resolve to the same manifest digest globally. Block here until that's
      # observed, or fail the publish — better than greenlighting a tag that
      # downstream smoke runs will pull stale.
      #
      # Caught 2026-04-29: a manual publish at 06:42 UTC pushed `:latest`,
      # plugin commits at 06:49 UTC triggered smokes that pulled `:latest`,
      # but the registry was still serving the previous manifest — the new
      # KTPHudObserver.amxx wasn't visible, all 7 plugin smokes failed with
      # `Plugin file open error`. Re-running 8h later succeeded against the
      # same `:latest` tag. See discord-embeds/CHANGES_SUMMARY_2026-05-01.md
      # for the full incident write-up.
      - name: Verify :latest propagation
        run: |
          set -euo pipefail
          SHORT_SHA="${{ steps.tag.outputs.short_sha }}"
          EXPECTED=$(docker buildx imagetools inspect "$IMAGE:$SHORT_SHA" --format '{{ .Manifest.Digest }}')
          echo "Expected manifest digest (from :$SHORT_SHA): $EXPECTED"
          for attempt in 1 2 3 4 5 6; do
            ACTUAL=$(docker buildx imagetools inspect "$IMAGE:latest" --format '{{ .Manifest.Digest }}' 2>/dev/null || echo "<lookup-failed>")
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              echo "Verified: :latest now resolves to $ACTUAL (attempt $attempt)"
              exit 0
            fi
            echo "Attempt $attempt: :latest=$ACTUAL, expected=$EXPECTED — sleeping 10s for GHCR propagation..."
            sleep 10
          done
          echo "::error::GHCR propagation timeout: :latest still doesn't match :$SHORT_SHA after 60s. Downstream smokes triggered now would pull a stale image. Likely a registry-side issue — re-run this workflow in a few minutes."
          exit 1

      - name: Image size
        run: docker image inspect "$IMAGE:latest" --format '{{ .Size }}' | numfmt --to=iec

      # --- Cleanup: retain only the N most recent SHA-tagged versions of
      # the package, plus `:latest` (always preserved). At ~2 GB per tag,
      # this caps storage at ~20 GB.
      #
      # min-versions-to-keep covers PR validation / hotfix windows where
      # the latest few builds are still actively referenced by smoke runs.
      # Increase if you find smoke flakes from a freshly-pruned tag being
      # pulled mid-run.
      - name: Prune old package versions
        if: ${{ !cancelled() && steps.tag.outcome == 'success' }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: ktp-runtime-test-base
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: false
